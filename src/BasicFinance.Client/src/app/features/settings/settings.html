<div class="flex flex-col space-y-4 lg:flex-row lg:space-y-0 lg:space-x-4">
  <aside class="lg:width-64">
    <section hlmCard class="rounded-sm py-2">
      <div hlmCardContent class="px-2">
        <nav>
          <ul>
            @for (item of navigationItems; track item.routerLink) {
              <li>
                <a
                  hlmItem
                  [routerLink]="item.routerLink"
                  routerLinkActive
                  #rla="routerLinkActive"
                  class="flex flex-row"
                >
                  <div hlmItemMedia>
                    <ng-icon [name]="item.icon" />
                  </div>
                  <div hlmItemContent>
                    <div hlmItemTitle>{{ item.label }}</div>
                  </div>
                  <div hlmItemActions>
                    <ng-icon name="lucideChevronRight" />
                  </div>
                </a>
              </li>
            }
          </ul>
        </nav>
      </div>
    </section>
  </aside>
  <div class="flex-1">
    <router-outlet></router-outlet>
  </div>
</div>
