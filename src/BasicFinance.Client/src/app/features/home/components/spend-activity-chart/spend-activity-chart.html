<section hlmCard class="flex flex-col gap-2 rounded-sm">
  <div hlmCardHeader>
    <h3 hlmCardTitle>Spend Activity</h3>
  </div>
  <div hlmCardContent class="flex justify-between items-center">
    <div class="font-semibold text-2xl">{{ totalSpend() | currency }}</div>
    <div class="text-sm flex items-center gap-1">
      @if (isSpendIncrease()) {
        <ng-icon hlm name="lucideArrowUpCircle" class="size-4 {{ changeClass() }}" />
        <span class="{{ changeClass() }}">{{ spendDifference() | currency }}</span> above last month
      } @else {
        <ng-icon hlm name="lucideArrowDownCircle" class="size-4 {{ changeClass() }}" />
        <span class="{{ changeClass() }}">{{ spendDifference() | currency }}</span> below last month
      }
    </div>
  </div>
  <div hlmCardFooter>
    <div
      echarts
      [options]="options()"
      [theme]="theme()"
      [autoResize]="true"
      class="w-full min-h-64 mt-2"
    ></div>
  </div>
</section>
