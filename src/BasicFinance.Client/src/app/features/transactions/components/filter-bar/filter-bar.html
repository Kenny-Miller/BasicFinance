<section hlmCard class="rounded-sm">
  <div hlmCardContent>
    <form [formGroup]="form" (ngSubmit)="onApply()">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
        <div hlmField>
          <label hlmFieldLabel for="filter-start-date">Start Date</label>
          <hlm-date-picker id="filter-start-date" formControlName="startDate"
            >Select start date</hlm-date-picker
          >
        </div>

        <div hlmField>
          <label hlmFieldLabel for="filter-end-date">End Date</label>
          <hlm-date-picker id="filter-end-date" formControlName="endDate"
            >Select end date</hlm-date-picker
          >
        </div>

        <div hlmField>
          <label hlmFieldLabel for="filter-min-amount">Min Amount</label>
          <input
            id="filter-min-amount"
            type="number"
            step="0.01"
            hlmInput
            placeholder="0.00"
            formControlName="minAmount"
          />
        </div>

        <div hlmField>
          <label hlmFieldLabel for="filter-max-amount">Max Amount</label>
          <input
            id="filter-max-amount"
            type="number"
            step="0.01"
            hlmInput
            placeholder="99999.99"
            formControlName="maxAmount"
          />
        </div>

        <div hlmField>
          <label hlmFieldLabel for="filter-type">Type</label>
          <hlm-select id="filter-type" class="inline-block" formControlName="transactionTypeId">
            <hlm-select-trigger class="w-full">
              <hlm-select-value />
            </hlm-select-trigger>
            <hlm-select-content *hlmSelectPortal>
              <hlm-select-group>
                @for (option of typeOptions; track option.value) {
                  <hlm-select-item [value]="option.value">{{ option.label }}</hlm-select-item>
                }
              </hlm-select-group>
            </hlm-select-content>
          </hlm-select>
        </div>

        <div hlmField>
          <label hlmFieldLabel for="filter-category">Category</label>
          <hlm-select
            id="filter-category"
            class="inline-block"
            formControlName="transactionCategoryId"
          >
            <hlm-select-trigger class="w-full">
              <hlm-select-value />
            </hlm-select-trigger>
            <hlm-select-content *hlmSelectPortal>
              <hlm-select-group>
                @for (option of categoryOptions; track option.value) {
                  <hlm-select-item [value]="option.value">{{ option.label }}</hlm-select-item>
                }
              </hlm-select-group>
            </hlm-select-content>
          </hlm-select>
        </div>

        <div hlmField>
          <label hlmFieldLabel for="filter-search">Search</label>
          <input
            id="filter-search"
            type="text"
            hlmInput
            placeholder="Description..."
            formControlName="search"
          />
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button hlmBtn type="submit">Apply</button>
        <button hlmBtn variant="outline" type="button" (click)="onReset()">Reset</button>
      </div>
    </form>
  </div>
</section>
