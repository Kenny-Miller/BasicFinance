<section hlmCard class="rounded-sm">
  <div hlmCardContent>
    <form [formGroup]="form" (ngSubmit)="onApply()">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
        <hlm-field>
          <label hlmFieldLabel for="filter-start-range-date">Start Range</label>
          <hlm-date-picker formControlName="startDate" autoCloseOnSelect="true">
            <hlm-date-picker-trigger buttonId="filter-start-range-date" class="w-full"
              >Pick a date</hlm-date-picker-trigger
            >
          </hlm-date-picker>
        </hlm-field>

        <hlm-field>
          <label hlmFieldLabel for="filter-end-range-date">End Range</label>
          <hlm-date-picker formControlName="endDate" autoCloseOnSelect="true">
            <hlm-date-picker-trigger buttonId="filter-end-range-date" class="w-full"
              >Pick a date</hlm-date-picker-trigger
            >
          </hlm-date-picker>
        </hlm-field>

        <div hlmField>
          <label hlmFieldLabel for="filter-min-amount">Min Amount</label>
          <input
            id="filter-min-amount"
            type="number"
            step="0.01"
            hlmInput
            placeholder="0.00"
            formControlName="minAmount"
          />
        </div>

        <div hlmField>
          <label hlmFieldLabel for="filter-max-amount">Max Amount</label>
          <input
            id="filter-max-amount"
            type="number"
            step="0.01"
            hlmInput
            placeholder="99999.99"
            formControlName="maxAmount"
          />
        </div>

        <div hlmField>
          <label hlmFieldLabel for="filter-transaction-type-select">Transaction Type</label>
          <hlm-select [itemToString]="transactionTypeToString" formControlName="transactionTypeId">
            <hlm-select-trigger class="w-full" buttonId="filter-transaction-type-select">
              <hlm-select-value placeholder="Choose a Transaction Type..." />
            </hlm-select-trigger>
            <hlm-select-content *hlmSelectPortal>
              <hlm-select-group>
                @for (option of transactionTypeOptions; track option.value) {
                  <hlm-select-item [value]="option.value">{{ option.label }}</hlm-select-item>
                }
              </hlm-select-group>
            </hlm-select-content>
          </hlm-select>
        </div>

        <div hlmField>
          <label hlmFieldLabel for="filter-category-select">Category</label>
          <hlm-select [itemToString]="categoryToString" formControlName="transactionCategoryId">
            <hlm-select-trigger class="w-full" buttonId="filter-category-select">
              <hlm-select-value placeholder="Choose a Category..." />
            </hlm-select-trigger>
            <hlm-select-content *hlmSelectPortal>
              <hlm-select-group>
                @for (option of categoryOptions; track option.value) {
                  <hlm-select-item [value]="option.value">{{ option.label }}</hlm-select-item>
                }
              </hlm-select-group>
            </hlm-select-content>
          </hlm-select>
        </div>

        <div hlmField>
          <label hlmFieldLabel for="filter-search">Search</label>
          <input
            id="filter-search"
            type="text"
            hlmInput
            placeholder="Description..."
            formControlName="search"
          />
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button hlmBtn type="submit">Apply</button>
        <button hlmBtn variant="outline" type="button" (click)="onReset()">Reset</button>
      </div>
    </form>
  </div>
</section>
