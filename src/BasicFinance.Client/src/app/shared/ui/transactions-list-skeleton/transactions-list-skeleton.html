<hlm-item-group>
  @for (item of skeletonList(); track $index; let last = $last) {
    <div hlmItem>
      <hlm-skeleton class="size-10" />
      <hlm-item-content class="gap-1">
        <hlm-skeleton class="h-6 w-full" />
        <hlm-skeleton class="h-4 w-24" />
      </hlm-item-content>
    </div>
    @if (!last) {
      <hlm-separator />
    }
  }
</hlm-item-group>
